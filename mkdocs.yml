site_name: Fablab Skanderborg
site_url: https://fablabskanderborg.github.io/docs/

# Markdown Extensions
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - admonition
  - attr_list

theme:
  name: material
  language: da
  logo: assets/fablab-logo-black-on-transparent.png
  features:
    #- navigation.instant
    - navigation.footer
    - navigation.tabs
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Skift til lyst tema
      primary: teal
      accent: deep orange
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Skift til mørkt tema
      primary: teal
      accent: deep orange
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Skift til system standard
      primary: teal
      accent: deep orange

# Navigation
nav:
  - Hjem: index.md
  - Maskiner: maskiner.md
  - Openlab: openlab.md
  - Precious Plastic:
      - Oversigt: 'Precious Plastic/intro.md'
      - 🛡️ Sikkerhed: 'Precious Plastic/sikkerhed.md'
      # - 🧪 Forsøgslog: 'Precious Plastic/log.md'
      # - 📸 Galleri: 'Precious Plastic/galleri.md'
  - Om: about.md

# Plugins (Rettet syntaks til i18n)
plugins:
  - i18n:
      languages:
        - locale: da
          default: true
          name: Dansk
        - locale: en
          name: English
          nav_translations:
            Hjem: Home
            Maskiner: Machines
            Openlab: Openlab
            Precious Plastic: Precious Plastic
            Om: About
      fallback_to_default: true
  - search


extra:
  social:
    - icon: fontawesome/brands/facebook 
      link: https://www.facebook.com/FablabSkanderborg/
