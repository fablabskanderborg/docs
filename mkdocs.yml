site_name: Fablab Skanderborg
site_url: https://fablab.dahl.sh

# Markdown Extensions
markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - attr_list

theme:
  name: material
  language: da
  logo: assets/fablab-logo-black-on-transparent.png
  features:
    - navigation.instant
    - navigation.footer
    - navigation.tabs
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Skift til lyst tema
      primary: teal
      accent: deep orange
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Skift til mørkt tema
      primary: teal
      accent: deep orange
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Skift til system standard
      primary: teal
      accent: deep orange

# Plugins (Rettet syntaks til i18n)
plugins:
  - search
  - i18n:
      default_language: da
      languages:
        - locale: da     # Rettet til liste-format
          name: Dansk
          default: true
        - locale: en     # Rettet til liste-format
          name: English
      fallback_to_default: true

# Navigation
nav:
  - Home: index.md
  - 3D Print: 3d.md
  - Laser: laser.md
  - Precious Plastic:
      - Oversigt: 'Precious Plastic/intro.md'
      # - 🛡️ Sikkerhed: 'Precious Plastic/sikkerhed.md'
      # - 🧪 Forsøgslog: 'Precious Plastic/log.md'
      # - 📸 Galleri: 'Precious Plastic/galleri.md'
  - Om: about.md

extra:
  social:
    - icon: fontawesome/brands/facebook 
      link: https://www.facebook.com/FablabSkanderborg/
